<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter Gacha</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="style_collections.css">
	<script src="cards.js" defer></script>
	<script src="collection.js" defer></script>
	<script src="modal2.js" defer></script>
	<script src="progress_bar.js" defer></script>
	<link rel="icon" href="icon.ico">
	

</head>
<body>

    <header>
        <div class="nav">
            <a href="main.html">Gacha</a>
            <a href="#"class="active">Collection</a>
        </div>
    </header>





<div class="progressbar">
	<progress id="progressBar" max="25869" value="0"></progress>
	<div id="progressText"></div>
</div>







<div class="collection_category">
<input id="searchInput" type="text" placeholder="Search...">
	<button data-rarity="O" onclick="toggleFilter('O')">Outstanding</button>
	<button data-rarity="E" onclick="toggleFilter('E')">Exceeds Expectations</button>
	<button data-rarity="A" onclick="toggleFilter('A')">Acceptable</button>
	<button data-rarity="P" onclick="toggleFilter('P')">Poor</button>
	<button data-rarity="D" onclick="toggleFilter('D')">Dreadful</button>
	<button data-rarity="T" onclick="toggleFilter('T')">Troll</button>
</div>





<table>
	<thead>
		<tr>
			<th onclick="setSort('name')" class="collection_name">Name</th>
			<th class="collection_rarity">Rarity</th>
			<th onclick="setSort('atk')" class="collection_atk">ATK</th>
			<th onclick="setSort('def')" class="collection_def">DEF</th>
			<th onclick="setSort('how_many')" class="collection_how_many">How many</th>
			<th onclick="setSort('id')" class="collection_ID">ID</th>
		</tr>
	</thead>
	<tbody id="tableBody"></tbody>
</table>




	<div class="card collection_fake_card" style="display:none">
		<div class="top-banner">
			<div class="rarity"></div>
			<div class="name"></div>
		</div>

		<div class="artwork">
			<span></span>
			<img>
		</div>
		<div class="info">
			<div class="description"></div>
		</div>
		<div class="stats">
			<div class="stat">
				<div class="label">ATK</div>
				<div class="value"></div>
			</div>
			<div class="stat">
				<div class="label">DEF</div>
				<div class="value"></div>
			</div>
		</div>
	</div>
	
	
<footer>thanks for playing :3</footer>



    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-content"></div>
    </div>

<script>

	const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');

</script>

</body>
</html>
